<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CEIA KDS</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    .order {
      background: #222;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    .received { border-left: 6px solid orange; }
    .preparing { border-left: 6px solid blue; }
    .ready { border-left: 6px solid green; }

    button {
      margin-top: 10px;
      padding: 6px 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🍣 CEIA KDS</h1>
<div id="orders"></div>

<script>
async function fetchOrders() {
  const res = await fetch("/orders");
  const orders = await res.json();

  const container = document.getElementById("orders");
  container.innerHTML = "";

  orders.forEach(order => {
    const div = document.createElement("div");
    div.className = "order " + order.status.toLowerCase();

    const items = JSON.parse(order.items)
      .map(i => `• ${i.name}`)
      .join("<br>");

    div.innerHTML = `
      <strong>Pedido #${order.id}</strong><br>
      ${items}<br><br>
      Total: R$${order.total}<br>
      Status: ${order.status}<br>
      <button onclick="updateStatus(${order.id}, 'PREPARING')">Preparando</button>
      <button onclick="updateStatus(${order.id}, 'READY')">Pronto</button>
    `;

    container.appendChild(div);
  });
}

async function updateStatus(id, status) {
  await fetch(`/orders/${id}/status`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status })
  });

  fetchOrders();
}

setInterval(fetchOrders, 3000);
fetchOrders();
</script>

</body>
</html>
