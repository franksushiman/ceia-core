name: Build Electron App

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build Electron (${{ matrix.platform }})
        run: npm run build:${{ matrix.platform }}

      - name: Listar artefatos gerados
        shell: bash
        run: ls -lh dist/ || true

      - name: Upload artefatos - Linux
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: CeIA-OS-Linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/latest-linux.yml
          if-no-files-found: warn

      - name: Upload artefatos - Windows
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: CeIA-OS-Windows
          path: |
            dist/*.exe
            dist/latest.yml
          if-no-files-found: warn

      - name: Upload artefatos - macOS
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: CeIA-OS-macOS
          path: |
            dist/*.dmg
            dist/latest-mac.yml
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Ler versão do package.json
        id: ver
        run: echo "VERSION=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download de todos os artefatos
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Listar artefatos baixados
        run: find artifacts -type f | sort

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.VERSION }}
          name: "CeIA OS ${{ steps.ver.outputs.VERSION }}"
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.dmg
            artifacts/**/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
