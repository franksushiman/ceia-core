name: Build Electron App

on:
  push:
    branches:
      - main

jobs:
  # ─── Guarda: só constrói e publica se a versão do package.json ainda não tem tag ───
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necessário para ver todas as tags

      - name: Verificar se versão já foi publicada
        id: check
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git ls-remote --tags origin | grep -q "refs/tags/${VERSION}$"; then
            echo "⚠️  Tag ${VERSION} já existe. Bumpe a versão no package.json para publicar uma nova release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Versão ${VERSION} é nova. Prosseguindo com o build."
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  # ─── Build por plataforma ─────────────────────────────────────────────────────────
  build:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build Electron (${{ matrix.platform }})
        run: npm run build:${{ matrix.platform }}

      - name: Listar artefatos gerados
        shell: bash
        run: ls -lh dist/ || true

      - name: Upload artefatos - Linux
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: CeIA-OS-Linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/latest-linux.yml
          if-no-files-found: warn

      - name: Upload artefatos - Windows
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: CeIA-OS-Windows
          path: |
            dist/*.exe
            dist/latest.yml
          if-no-files-found: warn

      - name: Upload artefatos - macOS
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: CeIA-OS-macOS
          path: |
            dist/*.dmg
            dist/latest-mac.yml
          if-no-files-found: warn

  # ─── Release ─────────────────────────────────────────────────────────────────────
  release:
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Download de todos os artefatos
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Listar artefatos baixados
        run: find artifacts -type f | sort

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.version }}
          name: "CeIA OS ${{ needs.check.outputs.version }}"
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.dmg
            artifacts/**/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
