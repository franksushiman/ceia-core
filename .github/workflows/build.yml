name: Build Electron App

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_pattern: "dist/*.AppImage\ndist/*.deb"
          - os: windows-latest
            platform: win
            artifact_pattern: "dist/*.exe"
          - os: macos-latest
            platform: mac
            artifact_pattern: "dist/*.dmg"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build Electron (${{ matrix.platform }})
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Listar artefatos gerados
        shell: bash
        run: ls -lh dist/ || true

      - name: Upload artefatos - Linux AppImage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: CeIA-OS-Linux-AppImage
          path: dist/*.AppImage
          if-no-files-found: warn

      - name: Upload artefatos - Linux deb
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: CeIA-OS-Linux-deb
          path: dist/*.deb
          if-no-files-found: warn

      - name: Upload artefatos - Windows
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: CeIA-OS-Windows-Setup
          path: dist/*.exe
          if-no-files-found: warn

      - name: Upload artefatos - macOS
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: CeIA-OS-macOS-dmg
          path: dist/*.dmg
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Download de todos os artefatos
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Listar artefatos baixados
        run: find artifacts -type f | sort

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "CeIA OS v1.0.0"
          draft: false
          prerelease: false
          overwrite: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
