<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CeIA OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./screens/cardapio.css">
  <link rel="stylesheet" href="./screens/despacho.css">
  <link rel="stylesheet" href="./screens/configuracoes.css">
  <link rel="stylesheet" href="./screens/zonas.css">
  <link rel="stylesheet" href="./screens/motoboys.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #000000;
      --surface:      #0a0a0a;
      --border:       #1a1a1a;
      --border-hover: #2a2a2a;
      --text:         #ffffff;
      --text-muted:   #6b6b6b;
      --text-dim:     #404040;
      --accent:       #ffffff;
      --status-ok:    #4ade80;
      --teal:         #00d0b7;
    }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: -0.01em;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Sidebar ──────────────────────────────────────────────────── */
    aside {
      width: 220px;
      flex-shrink: 0;
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .logo {
      padding: 24px 24px 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo-wordmark {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .logo-wordmark .dim { color: var(--text-dim); }
    .logo-wordmark .bright { color: var(--text); }
    .logo-sub {
      margin-top: 6px;
      font-size: 9px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    nav { margin-top: 8px; flex: 1; }

    nav a {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 12px 24px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.01em;
      border-left: 2px solid transparent;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      cursor: pointer;
      user-select: none;
    }
    nav a:hover {
      color: var(--text);
      background: rgba(255,255,255,0.03);
      border-left-color: var(--border-hover);
    }
    nav a.active {
      color: var(--text);
      background: rgba(255,255,255,0.06);
      border-left-color: var(--text);
    }
    nav a svg {
      flex-shrink: 0;
      transition: stroke 0.15s;
    }
    nav a:not(.active) svg { stroke: var(--text-muted); }
    nav a.active svg,
    nav a:hover svg { stroke: var(--text); }

    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    /* ── Main ─────────────────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 56px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      flex-shrink: 0;
    }
    .topbar-title {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }
    .status-indicator.ok  .status-dot {
      background: var(--status-ok);
      box-shadow: 0 0 6px rgba(74,222,128,0.5);
    }
    .status-indicator.err .status-dot { background: #ef4444; }
    .status-text {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }
    .status-indicator.ok  .status-text { color: var(--status-ok); }
    .status-indicator.err .status-text { color: #ef4444; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Content ─────────────────────────────────────────────────── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px;
    }
    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── Placeholder pages ───────────────────────────────────────── */
    .placeholder-module {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
    }
  </style>
</head>
<body>

<aside>
  <div class="logo">
    <div class="logo-wordmark">
      <span class="dim">Ce</span><span class="bright">IA</span>
    </div>
    <div class="logo-sub">Gestão de Delivery</div>
  </div>

  <nav>
    <!-- 1. Despacho — caixa com seta saindo -->
    <a class="active" data-page="despacho" onclick="navigate(this)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="4" width="9" height="8"/>
        <path d="M10 6h2l2 2v4h-4"/>
        <circle cx="4"  cy="12" r="1.5"/>
        <circle cx="10.5" cy="12" r="1.5"/>
      </svg>
      Despacho
    </a>

    <!-- 2. Cardápio — documento com linhas -->
    <a data-page="cardapio" onclick="navigate(this)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="1" width="10" height="12"/>
        <line x1="4.5" y1="5"   x2="9.5" y2="5"/>
        <line x1="4.5" y1="7.5" x2="9.5" y2="7.5"/>
        <line x1="4.5" y1="10"  x2="7.5" y2="10"/>
      </svg>
      Cardápio
    </a>

    <!-- 3. Motoboys — capacete/pin -->
    <a data-page="motoboys" onclick="navigate(this)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="7" cy="5.5" r="2.5"/>
        <path d="M7 13C7 13 2 8.5 2 5.5a5 5 0 0110 0C12 8.5 7 13 7 13z"/>
      </svg>
      Motoboys
    </a>

    <!-- 4. Zonas de Entrega — mapa com pin -->
    <a data-page="zonas" onclick="navigate(this)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 12.5C7 12.5 2.5 9 2.5 5.5a4.5 4.5 0 019 0C11.5 9 7 12.5 7 12.5z"/>
        <circle cx="7" cy="5.5" r="1.5"/>
      </svg>
      Zonas de Entrega
    </a>

    <!-- 5. Atendimentos — balão com sino -->
    <a data-page="atendimentos" onclick="navigate(this)" style="position:relative">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2H2a1 1 0 00-1 1v7a1 1 0 001 1h3l2 2 2-2h3a1 1 0 001-1V3a1 1 0 00-1-1z"/>
        <line x1="4.5" y1="6" x2="9.5" y2="6"/>
        <line x1="4.5" y1="8.5" x2="7.5" y2="8.5"/>
      </svg>
      Atendimentos
      <span id="atendimentos-badge"
            style="display:none;position:absolute;right:12px;top:50%;transform:translateY(-50%);
                   background:#ef4444;color:#fff;font-size:10px;font-weight:700;
                   min-width:16px;height:16px;border-radius:8px;
                   display:none;align-items:center;justify-content:center;padding:0 4px">
        0
      </span>
    </a>

    <!-- 6. Relatórios — barras verticais -->
    <a data-page="relatorios" onclick="navigate(this)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1"  y="7" width="3" height="6"/>
        <rect x="5.5" y="4" width="3" height="9"/>
        <rect x="10" y="1" width="3" height="12"/>
      </svg>
      Relatórios
    </a>

    <!-- 7. Configurações — engrenagem -->
    <a data-page="config" onclick="navigate(this)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="7" cy="7" r="2"/>
        <path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.93 2.93l1.06 1.06M10.01 10.01l1.06 1.06M2.93 11.07l1.06-1.06M10.01 3.99l1.06-1.06"/>
      </svg>
      Configurações
    </a>
  </nav>

  <div class="sidebar-footer">v1.0.0</div>
</aside>

<main>
  <div class="topbar">
    <span class="topbar-title" id="page-title">Despacho</span>
    <div style="display:flex;align-items:center;gap:10px">
      <!-- Indicador WhatsApp — clique leva para Configurações → aba WhatsApp -->
      <button id="wa-indicator" title="Status do WhatsApp"
              onclick="navigateToWA()"
              style="display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:4px;transition:background .15s"
              onmouseenter="this.style.background='rgba(255,255,255,.06)'"
              onmouseleave="this.style.background='none'">
        <svg id="wa-icon" width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-dim)">
          <path d="M12.5 2.5A6.5 6.5 0 0 0 1 7.5c0 1.1.3 2.2.8 3.1L1 14l3.6-.9A6.5 6.5 0 1 0 12.5 2.5z"/>
        </svg>
        <span id="wa-status-text" style="font-size:10px;color:var(--text-dim);letter-spacing:.04em;font-weight:500">WA</span>
      </button>
      <div class="status-indicator" id="status-indicator">
        <span class="status-dot"></span>
        <span class="status-text" id="status-label">AGUARDANDO</span>
      </div>
    </div>
  </div>

  <div class="content" id="content">
    <div id="page-despacho"></div>
    <div id="page-cardapio"      style="display:none"></div>
    <div id="page-motoboys"      style="display:none"></div>
    <div id="page-zonas"         style="display:none"></div>
    <div id="page-atendimentos"  style="display:none"></div>
    <div id="page-relatorios"    style="display:none"></div>
    <div id="page-config"        style="display:none"></div>
  </div>
</main>

<script>
  const TITLES = {
    despacho:     'Despacho',
    cardapio:     'Cardápio',
    motoboys:     'Motoboys',
    zonas:        'Zonas de Entrega',
    atendimentos: 'Atendimentos',
    relatorios:   'Relatórios',
    config:       'Configurações',
  };

  // Module registry — populated after scripts load
  const MODULES = {};

  let currentPage = 'despacho';
  let currentModule = null;

  async function navigate(el) {
    const page = el.dataset.page;
    if (page === currentPage) return;

    // Unmount current
    if (currentModule && currentModule.unmount) {
      currentModule.unmount(document.getElementById('page-' + currentPage));
    }

    // Deactivate nav
    document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
    el.classList.add('active');

    // Hide all pages
    document.querySelectorAll('[id^="page-"]').forEach(p => {
      p.style.display = 'none';
      p.classList.remove('active');
    });

    const target = document.getElementById('page-' + page);
    if (!target) return;

    // Mount new page
    const mod = MODULES[page];
    if (mod) {
      currentModule = mod;
      await mod.mount(target);
    } else {
      target.style.display = 'flex';
      target.classList.add('active');
      target.innerHTML = `
        <div class="placeholder-module">
          <h2 style="font-size:20px;font-weight:600;letter-spacing:-0.03em;color:var(--text)">${TITLES[page] || page}</h2>
          <p style="font-size:13px;color:var(--text-muted);letter-spacing:-0.01em">Module not initialized</p>
          <hr style="width:40px;border:none;border-top:1px solid var(--border)">
        </div>`;
      currentModule = null;
    }

    document.getElementById('page-title').textContent = TITLES[page] || page;
    currentPage = page;
  }

  // ── Health check ─────────────────────────────────────────────────
  const indicator = document.getElementById('status-indicator');
  const label     = document.getElementById('status-label');

  async function checkHealth() {
    try {
      const base = (window.CEIA && window.CEIA.apiBase) || 'http://127.0.0.1:3000';
      const res  = await fetch(base + '/api/health', { signal: AbortSignal.timeout(4000) });
      const data = await res.json();
      if (data.ok) {
        indicator.className = 'status-indicator ok';
        label.textContent   = 'CONECTADO';
        return;
      }
    } catch (_) {}
    indicator.className = 'status-indicator err';
    label.textContent   = 'ERRO';
  }

  checkHealth();
  setInterval(checkHealth, 15_000);

  // ── Indicador WhatsApp ────────────────────────────────────────────────
  const _waIcon       = document.getElementById('wa-icon');
  const _waStatusText = document.getElementById('wa-status-text');

  const WA_STATE = {
    desconectado:  { color: 'var(--text-dim)', label: 'WA' },
    aguardando_qr: { color: '#f59e0b',         label: 'QR' },
    conectando:    { color: '#f59e0b',         label: '...' },
    conectado:     { color: '#22c55e',         label: 'WA' },
    erro:          { color: '#ef4444',         label: 'ERR' },
  };

  function updateWAIndicator(status) {
    const s = WA_STATE[status] || WA_STATE.desconectado;
    if (_waIcon)       _waIcon.style.color       = s.color;
    if (_waStatusText) { _waStatusText.textContent = s.label; _waStatusText.style.color = s.color; }
  }

  // ── SSE global — notificações cross-page (badge + toasts) ───────────────────
  (function() {
    let _sseGlobal    = null;
    let _sseConectado = false; // true quando o canal está OPEN

    function _conectarSSEGlobal() {
      // Evita criar duplicata se já existe conexão ativa ou em reconexão nativa
      if (_sseGlobal && _sseGlobal.readyState !== EventSource.CLOSED) return;
      const base = (window.CEIA && window.CEIA.apiBase) || 'http://127.0.0.1:3000';
      _sseGlobal = new EventSource(base + '/api/eventos');
      _sseConectado = false;
      _sseGlobal.onmessage = (e) => {
        try { _handleGlobalSSE(JSON.parse(e.data)); } catch (_) {}
      };
      _sseGlobal.onopen = () => {
        if (_sseConectado) {
          // Reconectou após queda — rebusca estado pra compensar eventos perdidos
          if (typeof MODULES !== 'undefined' && MODULES.despacho?.loadAndRender) {
            MODULES.despacho.loadAndRender();
          }
        }
        _sseConectado = true;
      };
      _sseGlobal.onerror = () => {
        // NÃO fechar aqui — o EventSource nativo reconecta automaticamente.
        // Só intervimos se a conexão foi definitivamente fechada (CLOSED state),
        // o que só acontece se o servidor enviar 204/301 explicitamente.
        if (_sseGlobal.readyState === EventSource.CLOSED) {
          _sseConectado = false;
          setTimeout(_conectarSSEGlobal, 3000);
        }
        // Se readyState === CONNECTING, o browser está reconectando — não interfira.
      };
    }

    function _handleGlobalSSE(d) {
      if (d.tipo === 'CHAMADO_ABERTO') {
        const nome = d.nome || d.numero || 'Cliente';
        window.Toast?.info(`🔔 ${nome} pediu atendimento humano`, { duration: 0 });
        _refreshBadge();
        // Notifica o módulo Atendimentos se estiver montado
        document.dispatchEvent(new CustomEvent('wa:chamado_aberto', { detail: d }));
      } else if (d.tipo === 'CHAMADO_ENCERRADO') {
        _refreshBadge();
        document.dispatchEvent(new CustomEvent('wa:chamado_encerrado', { detail: d }));
      } else if (d.tipo === 'MENSAGEM_MANUAL') {
        document.dispatchEvent(new CustomEvent('wa:mensagem_manual', { detail: d }));
        _refreshBadge();
      } else if (d.tipo === 'ATENDIMENTO_ASSUMIDO') {
        document.dispatchEvent(new CustomEvent('wa:atendimento_assumido', { detail: d }));
      } else if (d.tipo === 'ATENDIMENTO_DEVOLVIDO') {
        document.dispatchEvent(new CustomEvent('wa:atendimento_devolvido', { detail: d }));
        _refreshBadge();
      } else if (d.tipo === 'MENSAGEM_ATENDENTE') {
        document.dispatchEvent(new CustomEvent('wa:mensagem_atendente', { detail: d }));
      } else if (d.tipo === 'pedido_criado') {
        // Novo pedido WhatsApp — atualiza kanban se Despacho estiver montado
        if (typeof MODULES !== 'undefined' && MODULES.despacho?.loadAndRender) {
          MODULES.despacho.loadAndRender();
        }
      }
    }

    async function _refreshBadge() {
      try {
        const base = (window.CEIA && window.CEIA.apiBase) || 'http://127.0.0.1:3000';
        const r    = await fetch(base + '/api/atendimentos/pendentes');
        const data = await r.json();
        const n    = data.count || 0;
        const badge = document.getElementById('atendimentos-badge');
        if (badge) {
          badge.textContent    = n;
          badge.style.display  = n > 0 ? 'inline-flex' : 'none';
        }
      } catch (_) {}
    }

    window._refreshBadgeAtendimentos = _refreshBadge;
    _refreshBadge();
    _conectarSSEGlobal();
  })();

  // Recebe evento disparado pela aba WhatsApp (polling interno de configuracoes.js)
  document.addEventListener('wa:status', e => updateWAIndicator(e.detail?.status));

  // Polling autônomo a cada 10 s (funciona em qualquer aba)
  async function checkWAStatus() {
    try {
      const base = (window.CEIA && window.CEIA.apiBase) || 'http://127.0.0.1:3000';
      const r    = await fetch(base + '/api/whatsapp/status', { signal: AbortSignal.timeout(4000) });
      const data = await r.json();
      updateWAIndicator(data.status);
    } catch (_) {}
  }
  checkWAStatus();
  setInterval(checkWAStatus, 10_000);

  // Clique no indicador → navega para Configurações e abre aba WhatsApp
  function navigateToWA() {
    const cfgLink = document.querySelector('nav a[data-page="config"]');
    if (!cfgLink) return;
    navigate(cfgLink);
    // Aguarda renderização e clica na aba WhatsApp
    setTimeout(() => {
      const waTab = document.querySelector('.cfg2-tab[data-tab="whatsapp"]');
      if (waTab) waTab.click();
    }, 150);
  }
</script>
<link rel="stylesheet" href="./dialog.css">
<script src="./dialog.js"></script>
<script src="./toast.js"></script>
<script src="./lib/google-maps-loader.js"></script>
<script src="./screens/despacho.js"></script>
<script src="./screens/zonas.js"></script>
<script src="./screens/configuracoes.js"></script>
<script src="./screens/cardapio.js"></script>
<script src="./screens/motoboys.js"></script>
<script src="./screens/atendimentos.js"></script>
<script src="./screens/relatorios.js"></script>
<script>
  // Register modules after all scripts loaded
  MODULES.despacho     = Despacho;
  MODULES.zonas        = Zonas;
  MODULES.config       = Configuracoes;
  MODULES.cardapio     = Cardapio;
  MODULES.motoboys     = Motoboys;
  MODULES.atendimentos = Atendimentos;
  MODULES.relatorios   = Relatorios;

  // Boot: mount default page (Despacho)
  (async () => {
    const defaultEl = document.querySelector('nav a[data-page="despacho"]');
    const target    = document.getElementById('page-despacho');
    currentModule   = Despacho;
    await Despacho.mount(target);
  })();
</script>
</body>
</html>
